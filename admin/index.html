<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | The Zest Classes</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #0a1220, #1B365D);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #0F1E3D;
      border: 1px solid rgba(235,168,33,0.2);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .shield {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #EBA821, #C98A10);
      border-radius: 12px 12px 12px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: #0F1E3D;
    }

    .logo-text-wrap { display: flex; flex-direction: column; }
    .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.08em;
    }
    .logo-sub {
      font-size: 0.65rem;
      color: rgba(235,168,33,0.7);
      letter-spacing: 0.12em;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      color: #fff;
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #FCA5A5;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      margin-bottom: 0.4rem;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.85rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.25rem;
    }

    input[type="password"]:focus {
      border-color: #EBA821;
      box-shadow: 0 0 0 3px rgba(235,168,33,0.1);
    }

    button {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #EBA821, #C98A10);
      color: #0F1E3D;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(235,168,33,0.4);
    }

    .footer-note {
      text-align: center;
      margin-top: 1.75rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.15);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>

  <div class="card" id="loginCard">

    <div class="logo-wrap">
      <div class="logo-shield" style="background: transparent; box-shadow: none;">
             <img src="images/zestlogo.jpg" alt="The Zest Logo" style="width: 40px; height: 40px; object-fit: contain;" />
            </div>
      <div class="logo-text-wrap">
        <span class="logo-name">THE ZEST</span>
        <span class="logo-sub">Admin Portal</span>
      </div>
    </div>

    <h2>Admin Access</h2>
    <p class="subtitle">Authorized personnel only</p>

    <div class="error-box" id="errorBox">
      ❌ Incorrect password. Please try again.
    </div>

    <label for="passInput">Password</label>
    <input
      type="password"
      id="passInput"
      placeholder="Enter admin password"
      autocomplete="current-password"
      onkeydown="if(event.key==='Enter') login()"
    />

    <button onclick="login()">Access Dashboard →</button>

    <p class="footer-note">The Zest Classes · Dighi, Pune</p>
  </div>

  <script>
    // Redirect if already logged in
    if (sessionStorage.getItem('zest_admin_auth') === 'true') {
      window.location.href = 'dashboard.html';
    }

    function login() {
      const pass = document.getElementById('passInput').value;
      const errorBox = document.getElementById('errorBox');
      const card = document.getElementById('loginCard');

      // Password stored in localStorage (changed via Settings page)
      const ADMIN_PASSWORD = localStorage.getItem('zest_admin_password') || 'ZestAdmin2025';

      if (pass === ADMIN_PASSWORD) {
        sessionStorage.setItem('zest_admin_auth', 'true');
        window.location.href = 'dashboard.html';
      } else {
        errorBox.style.display = 'block';
        document.getElementById('passInput').value = '';
        document.getElementById('passInput').focus();
        card.classList.remove('shake');
        void card.offsetWidth;
        card.classList.add('shake');
      }
    }
  </script>

</body>
</html>
