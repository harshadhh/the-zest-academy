<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | The Zest Classes</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Outfit',sans-serif;background:linear-gradient(135deg,#0a1220,#1B365D);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    .card{background:#0F1E3D;border:1px solid rgba(235,168,33,.2);border-radius:24px;padding:3rem 2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
    .logo-wrap{display:flex;align-items:center;justify-content:center;gap:.75rem;margin-bottom:2rem;}
    .logo-text-wrap{display:flex;flex-direction:column;}
    .logo-name{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:#fff;letter-spacing:.08em;}
    .logo-sub{font-size:.65rem;color:rgba(235,168,33,.7);letter-spacing:.12em;}
    h2{font-family:'Playfair Display',serif;color:#fff;font-size:1.5rem;text-align:center;margin-bottom:.4rem;}
    .subtitle{text-align:center;color:rgba(255,255,255,.4);font-size:.85rem;margin-bottom:2rem;}
    .error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#FCA5A5;padding:.75rem 1rem;border-radius:10px;font-size:.85rem;margin-bottom:1.25rem;display:none;}
    .info-box{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);color:#93C5FD;padding:.7rem 1rem;border-radius:10px;font-size:.8rem;margin-bottom:1rem;display:none;}
    label{display:block;font-size:.8rem;font-weight:600;color:rgba(255,255,255,.55);margin-bottom:.4rem;}
    .input-wrap{position:relative;margin-bottom:1.25rem;}
    .input-wrap input[type="password"]{width:100%;padding:.85rem 3rem .85rem 1rem;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;font-family:'Outfit',sans-serif;font-size:1rem;color:#fff;outline:none;transition:border-color .2s;}
    .input-wrap input:focus{border-color:#EBA821;box-shadow:0 0 0 3px rgba(235,168,33,.1);}
    .eye-btn{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;font-size:1.1rem;padding:.2rem;}
    .eye-btn:hover{color:rgba(255,255,255,.7);}
    button.submit-btn{width:100%;padding:.9rem;background:linear-gradient(135deg,#EBA821,#C98A10);color:#0F1E3D;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;border:none;border-radius:12px;cursor:pointer;transition:transform .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;}
    button.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(235,168,33,.4);}
    button.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .footer-note{text-align:center;margin-top:1.75rem;font-size:.75rem;color:rgba(255,255,255,.15);}
    .sync-status{text-align:center;margin-top:.75rem;font-size:.72rem;color:rgba(255,255,255,.2);}
    .sync-status.live{color:rgba(16,185,129,.6);}
    .sync-status.local{color:rgba(235,168,33,.5);}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
    .shake{animation:shake .4s ease;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:18px;height:18px;border:2px solid rgba(15,30,61,.4);border-top-color:#0F1E3D;border-radius:50%;animation:spin .7s linear infinite;display:none;}
  </style>
</head>
<body>
<div class="card" id="loginCard">
  <div class="logo-wrap">
    <div style="background:transparent;box-shadow:none;">
      <img src="../images/zestlogo.jpg" alt="Logo" style="width:44px;height:44px;object-fit:contain;" onerror="this.style.display='none'" />
    </div>
    <div class="logo-text-wrap">
      <span class="logo-name">THE ZEST</span>
      <span class="logo-sub">ADMIN PORTAL</span>
    </div>
  </div>

  <h2>Admin Access</h2>
  <p class="subtitle">Authorized personnel only</p>

  <div class="info-box" id="infoBox"></div>
  <div class="error-box" id="errorBox"></div>

  <label for="passInput">Password</label>
  <div class="input-wrap">
    <input type="password" id="passInput" placeholder="Enter admin password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()" />
    <button class="eye-btn" type="button" onclick="toggleEye()" id="eyeBtn" title="Show/hide">👁</button>
  </div>

  <button class="submit-btn" id="loginBtn" onclick="login()">
    <span id="btnText">Access Dashboard →</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <div class="sync-status" id="syncStatus">Checking connection...</div>
  <p class="footer-note">The Zest Classes · Dighi, Pune</p>
</div>

<script>
// ── Already logged in? ────────────────────────────────────────────
const savedToken = sessionStorage.getItem('zest_token');
if (savedToken) window.location.href = 'dashboard.html';

// ── API URL stored in localStorage (set via settings) ────────────
const API_URL = localStorage.getItem('zest_api_url') || '';

// ── SHA-256 using Web Crypto ──────────────────────────────────────
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Check API connection on load ──────────────────────────────────
const syncEl = document.getElementById('syncStatus');
if (API_URL) {
  fetch(API_URL)
    .then(r => r.json())
    .then(d => {
      if (d.ok) { syncEl.textContent = '🟢 Live sync active'; syncEl.className = 'sync-status live'; }
      else throw new Error();
    })
    .catch(() => { syncEl.textContent = '🟡 Offline mode (data saves locally)'; syncEl.className = 'sync-status local'; });
} else {
  syncEl.textContent = '🟡 No sync configured — local mode only';
  syncEl.className = 'sync-status local';
}

// ── Toggle password visibility ────────────────────────────────────
function toggleEye() {
  const inp = document.getElementById('passInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

// ── Login ─────────────────────────────────────────────────────────
async function login() {
  const passEl  = document.getElementById('passInput');
  const errorEl = document.getElementById('errorBox');
  const infoEl  = document.getElementById('infoBox');
  const btn     = document.getElementById('loginBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const card    = document.getElementById('loginCard');

  const pass = passEl.value;
  if (!pass) {
    passEl.style.borderColor = '#EF4444';
    setTimeout(() => passEl.style.borderColor = '', 2000);
    return;
  }

  // Show loading state
  btn.disabled = true;
  btnText.textContent = 'Verifying...';
  spinner.style.display = 'block';
  errorEl.style.display = 'none';
  infoEl.style.display  = 'none';

  const hash = await sha256(pass);

  try {
    if (API_URL) {
      // ── Try live API auth ─────────────────────────────────────
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'login', data: { hash } })
      });
      const data = await res.json();

      if (data.ok && data.token) {
        sessionStorage.setItem('zest_token', data.token);
        sessionStorage.setItem('zest_admin_auth', 'true'); // backward compat
        sessionStorage.setItem('zest_auth_mode', 'live');
        window.location.href = 'dashboard.html';
        return;
      } else {
        throw new Error(data.error || 'Invalid password');
      }
    } else {
      // ── Offline / local fallback ──────────────────────────────
      const storedHash = localStorage.getItem('zest_pw_hash') || '8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918';
      if (hash === storedHash) {
        sessionStorage.setItem('zest_admin_auth', 'true');
        sessionStorage.setItem('zest_auth_mode', 'local');
        window.location.href = 'dashboard.html';
        return;
      } else {
        throw new Error('Incorrect password');
      }
    }
  } catch (err) {
    passEl.value = '';
    passEl.focus();
    errorEl.textContent = '❌ ' + (err.message || 'Incorrect password');
    errorEl.style.display = 'block';
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
  } finally {
    btn.disabled  = false;
    btnText.textContent = 'Access Dashboard →';
    spinner.style.display = 'none';
  }
}
</script>
</body>
</html>
